<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiodaroFitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; font-size: 14px; }
        .box { background: #09090b; border: 1px solid #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .input-dark { background: #000; border: 1px solid #27272a; padding: 10px; width: 100%; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 8px; }
        .btn { padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; text-transform: uppercase; width: 100%; }
        .hidden-text { filter: blur(5px); pointer-events: none; }
    </style>
</head>
<body class="p-4">

    <header class="box">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black text-yellow-500 text-xl tracking-tighter">CIODAROFITNESS</h1>
            <button onclick="toggleMontos()" class="text-[9px] bg-zinc-800 p-2 rounded-lg">👁️ OCULTAR</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <div><p class="text-[9px] text-zinc-500 uppercase">Valor Planes</p><span id="val-planes" class="text-lg font-black">$0</span></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Recaudado</p><span id="val-recaudado" class="text-lg font-black text-emerald-500">$0</span></div>
        </div>
    </header>

    <input type="text" id="busc" onkeyup="render()" placeholder="🔍 Buscar alumno..." class="input-dark">
    <button onclick="abrirModal(null)" class="btn bg-yellow-500 text-black mb-4">➕ Nuevo Alumno</button>

    <div id="lista" class="space-y-3"></div>

    <div id="modal" class="fixed inset-0 bg-black hidden p-4 overflow-y-auto z-50">
        <div class="flex justify-between mb-4">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-sm font-bold">✕ Cerrar</button>
            <button onclick="borrarCliente()" class="text-sm font-bold text-red-500">🗑️ BORRAR ALUMNO</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="ex-nom" placeholder="Nombre" class="input-dark">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="ex-peso" placeholder="Peso (kg)" class="input-dark">
                <input type="number" id="ex-est" placeholder="Estatura (cm)" class="input-dark">
            </div>
            <input type="number" id="ex-plan" placeholder="Valor del Plan" class="input-dark">
            
            <div class="box">
                <h3 class="text-[10px] uppercase text-zinc-500 mb-2">Historial de Pagos</h3>
                <div class="flex gap-2">
                    <input type="date" id="pago-fecha" class="input-dark text-[10px]">
                    <input type="number" id="pago-monto" placeholder="$" class="input-dark">
                    <button onclick="agregarPago()" class="btn bg-emerald-600 w-auto">ADD</button>
                </div>
                <div id="hist-pagos" class="text-xs space-y-1"></div>
            </div>
            
            <div class="box">
                <h3 class="text-[10px] uppercase text-zinc-500 mb-3">Antropometría</h3>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="m-c" placeholder="Cuello">
                    <input type="number" id="m-t" placeholder="Tórax">
                    <input type="number" id="m-b" placeholder="Bíceps">
                    <input type="number" id="m-cin" placeholder="Cintura">
                    <input type="number" id="m-g" placeholder="Glúteos">
                    <input type="number" id="m-cuad" placeholder="Cuád." >
                    <input type="number" id="m-pan" placeholder="Pantorrilla">
                </div>
                <button onclick="guardarMetrica()" class="btn bg-yellow-500 text-black mt-2 text-[10px]">Guardar y Calcular</button>
                <div id="hist-met" class="mt-4 text-xs space-y-1"></div>
            </div>
            <button onclick="guardarCliente()" class="btn bg-zinc-800">GUARDAR TODO</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ciodaro_db')) || [];
        let cur = null;

        function render() {
            let totalPlanes = db.reduce((a, b) => a + parseFloat(b.plan||0), 0);
            let totalRecaudado = db.reduce((a, b) => a + (b.pagos||[]).reduce((x, y) => x + parseFloat(y.monto), 0), 0);
            document.getElementById('val-planes').innerText = `$${totalPlanes}`;
            document.getElementById('val-recaudado').innerText = `$${totalRecaudado}`;
            
            document.getElementById('lista').innerHTML = db.map((c, i) => `
                <div class="box flex justify-between items-center">
                    <div><h3 class="font-bold text-sm">${c.nom}</h3><span class="text-[10px] text-zinc-500">Plan: $${c.plan}</span></div>
                    <button onclick="abrirModal(${i})" class="bg-zinc-900 px-3 py-2 rounded-lg font-bold text-[10px] border border-zinc-700">EXPEDIENTE</button>
                </div>
            `).join('');
        }

        function abrirModal(i) {
            cur = i;
            if(i !== null) {
                document.getElementById('ex-nom').value = db[i].nom;
                document.getElementById('ex-plan').value = db[i].plan;
                document.getElementById('ex-peso').value = db[i].peso || '';
                document.getElementById('ex-est').value = db[i].est || '';
                renderPagos(); renderMetricas();
            } else { document.getElementById('ex-nom').value = ''; }
            document.getElementById('modal').classList.remove('hidden');
        }

        function agregarPago() {
            let monto = parseFloat(document.getElementById('pago-monto').value);
            let fecha = document.getElementById('pago-fecha').value;
            if(!db[cur].pagos) db[cur].pagos = [];
            db[cur].pagos.push({fecha, monto});
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            renderPagos(); render();
        }

        function renderPagos() {
            document.getElementById('hist-pagos').innerHTML = (db[cur].pagos||[]).map(p => `<div class="border-b border-zinc-900 py-1 text-[10px]">${p.fecha}: $${p.monto}</div>`).join('');
        }

        function guardarMetrica() {
            let p = parseFloat(document.getElementById('ex-peso').value);
            let h = parseFloat(document.getElementById('ex-est').value) / 100;
            let imc = (p / (h * h)).toFixed(1);
            let grasa = (imc * 1.2).toFixed(1);
            if(!db[cur].met) db[cur].met = [];
            db[cur].met.push({fecha: new Date().toLocaleDateString(), imc, grasa});
            db[cur].peso = p; db[cur].est = h*100;
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            renderMetricas();
        }

        function renderMetricas() {
            document.getElementById('hist-met').innerHTML = (db[cur].met||[]).map(m => 
                `<div class="flex justify-between border-b border-zinc-900 py-1"><span>${m.fecha}</span><span class="font-bold text-[10px]">IMC: ${m.imc} | Grasa: ${m.grasa}%</span></div>`
            ).join('');
        }

        function borrarCliente() {
            if(confirm('¿Borrar alumno definitivamente?')) {
                db.splice(cur, 1);
                localStorage.setItem('ciodaro_db', JSON.stringify(db));
                document.getElementById('modal').classList.add('hidden');
                render();
            }
        }

        function guardarCliente() {
            let data = { nom: document.getElementById('ex-nom').value, plan: document.getElementById('ex-plan').value, peso: document.getElementById('ex-peso').value, est: document.getElementById('ex-est').value };
            if(cur === null) { db.push({...data, pagos: [], met: []}); }
            else { db[cur] = {...db[cur], ...data}; }
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            document.getElementById('modal').classList.add('hidden');
            render();
        }
        window.onload = render;
    </script>
</body>
</html>
