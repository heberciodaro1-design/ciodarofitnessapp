<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 
            'ciodaro-black': '#09090b', 'ciodaro-grey': '#1c1c1e', 
            'ciodaro-input': '#2c2c2e', 'ciodaro-yellow': '#facc15' 
        }}}}
    </script>
</head>
<body class="bg-ciodaro-black text-zinc-100 font-sans min-h-screen pb-12">

    <div class="max-w-4xl mx-auto p-4 space-y-4">
        <header class="grid grid-cols-2 gap-3 bg-ciodaro-grey p-4 rounded-xl border border-zinc-800">
            <div>
                <h1 class="text-sm font-black text-ciodaro-yellow">CIODAROFITNESS</h1>
                <p class="text-[9px] text-zinc-500 uppercase">Panel de Control</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-zinc-500 uppercase">Total en Caja</p>
                <h2 id="txt-caja-total" class="text-sm font-black text-emerald-400">$0</h2>
            </div>
        </header>

        <input type="text" id="input-buscador" onkeyup="renderizar()" placeholder="🔍 Buscar alumno..." class="w-full bg-ciodaro-grey border border-zinc-800 p-3 rounded-lg text-sm outline-none focus:border-ciodaro-yellow">
        <button onclick="abrirExpedienteUnico(null)" class="w-full bg-ciodaro-yellow text-black font-black p-3 rounded-lg uppercase text-sm">➕ Nuevo Alumno</button>

        <div id="contenedor-clientes" class="space-y-2"></div>
    </div>

    <!-- MODAL -->
    <div id="modal-expediente" class="fixed inset-0 bg-black/95 hidden flex items-start justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-ciodaro-grey w-full max-w-2xl rounded-xl border border-zinc-800 p-4 space-y-5 my-2">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
                <h2 class="text-base font-black text-ciodaro-yellow uppercase">Ficha del Alumno</h2>
                <button onclick="cerrarExpediente()" class="text-white text-xl">✕</button>
            </div>

            <!-- PERFIL -->
            <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800 space-y-3">
                <input type="text" id="ex-nombre" placeholder="Nombre" class="w-full bg-ciodaro-input p-2 rounded text-sm">
                <input type="number" id="ex-cuota" placeholder="Costo Plan ($)" class="w-full bg-ciodaro-input p-2 rounded text-sm">
                <button type="button" onclick="guardarDatosPerfil()" class="w-full bg-zinc-800 text-ciodaro-yellow font-black p-3 rounded uppercase text-[11px]">💾 Guardar</button>
            </section>

            <div id="bloques-historial-progresivo" class="space-y-5 hidden">
                <!-- FINANZAS -->
                <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800">
                    <h3 class="text-[11px] font-black text-emerald-400 uppercase">Caja de Abonos</h3>
                    <div class="flex gap-2 mt-2">
                        <input type="number" id="pago-monto" placeholder="$" class="bg-ciodaro-input p-1 rounded w-20">
                        <button onclick="agregarPago()" class="bg-emerald-600 px-4 rounded text-black font-black">+</button>
                    </div>
                    <div id="lista-pagos" class="mt-2 text-xs"></div>
                </section>

                <!-- MÉTRICAS -->
                <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800">
                    <h3 class="text-[11px] font-black text-ciodaro-yellow uppercase">Métricas</h3>
                    <form onsubmit="agregarMetrica(event)" class="grid grid-cols-2 gap-2 mt-2 text-[10px]">
                        <input type="number" id="m-peso" placeholder="Peso (kg)" class="bg-ciodaro-input p-1 rounded">
                        <input type="number" id="m-estatura" placeholder="Altura (cm)" class="bg-ciodaro-input p-1 rounded">
                        <button class="col-span-2 bg-ciodaro-yellow text-black font-black p-2 rounded uppercase">Calcular y Guardar</button>
                    </form>
                    <div id="lista-metrics" class="space-y-2 mt-4"></div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let baseClientes = JSON.parse(localStorage.getItem('ciodaro_fitness_db')) || [];
        let clienteActualIndex = null;

        function abrirExpedienteUnico(index) {
            clienteActualIndex = index;
            document.getElementById('modal-expediente').classList.remove('hidden');
            if (index !== null) {
                let c = baseClientes[index];
                document.getElementById('ex-nombre').value = c.nombre;
                document.getElementById('ex-cuota').value = c.cuota;
                document.getElementById('bloques-historial-progresivo').classList.remove('hidden');
                renderizarSecciones();
            } else { document.getElementById('bloques-historial-progresivo').classList.add('hidden'); }
        }

        function cerrarExpediente() { document.getElementById('modal-expediente').classList.add('hidden'); renderizar(); }

        function guardarDatosPerfil() {
            let datos = { nombre: document.getElementById('ex-nombre').value, cuota: parseFloat(document.getElementById('ex-cuota').value) || 0, pagos: clienteActualIndex !== null ? baseClientes[clienteActualIndex].pagos : [], mediciones: clienteActualIndex !== null ? baseClientes[clienteActualIndex].mediciones : [] };
            if(clienteActualIndex === null) { baseClientes.push(datos); clienteActualIndex = baseClientes.length - 1; }
            else { baseClientes[clienteActualIndex] = {...baseClientes[clienteActualIndex], ...datos}; }
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            document.getElementById('bloques-historial-progresivo').classList.remove('hidden');
        }

        function agregarPago() {
            let monto = parseFloat(document.getElementById('pago-monto').value);
            baseClientes[clienteActualIndex].pagos.push(monto);
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            renderizarSecciones();
        }

        function agregarMetrica(e) { e.preventDefault();
            let p = parseFloat(document.getElementById('m-peso').value);
            let h = parseFloat(document.getElementById('m-estatura').value) / 100;
            let imc = (p / (h * h)).toFixed(1);
            baseClientes[clienteActualIndex].mediciones.push({ imc: imc });
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            renderizarSecciones();
        }

        function renderizarSecciones() {
            let c = baseClientes[clienteActualIndex];
            document.getElementById('lista-pagos').innerHTML = c.pagos.map(p => `<div class="text-emerald-400">+$${p}</div>`).join('');
            document.getElementById('lista-metrics').innerHTML = c.mediciones.map(m => `<div class="text-zinc-300">IMC: ${m.imc}</div>`).join('');
        }

        function renderizar() {
            let total = baseClientes.reduce((acc, c) => acc + (c.pagos ? c.pagos.reduce((a, b) => a + b, 0) : 0), 0);
            document.getElementById('txt-caja-total').innerText = `$${total}`;
            let filtro = document.getElementById('input-buscador').value.toLowerCase();
            document.getElementById('contenedor-clientes').innerHTML = baseClientes.filter(c => c.nombre.toLowerCase().includes(filtro)).map((c, i) => `
                <div class="bg-ciodaro-grey p-4 rounded-lg border border-zinc-800 flex justify-between items-center">
                    <h3 class="font-black text-sm">${c.nombre}</h3>
                    <button onclick="abrirExpedienteUnico(${i})" class="bg-zinc-800 text-ciodaro-yellow px-3 py-1 rounded text-xs font-black">📂 EXPEDIENTE</button>
                </div>
            `).join('');
        }
        window.onload = renderizar;
    </script>
</body>
</html>
