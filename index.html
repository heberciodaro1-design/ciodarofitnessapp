<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 
            'ciodaro-black': '#09090b', 'ciodaro-grey': '#1c1c1e', 
            'ciodaro-input': '#2c2c2e', 'ciodaro-yellow': '#facc15' 
        }}}}
    </script>
</head>
<body class="bg-ciodaro-black text-zinc-100 font-sans min-h-screen pb-12">

    <div class="max-w-4xl mx-auto p-4 space-y-4">
        <!-- HEADER -->
        <header class="flex flex-col sm:flex-row justify-between items-start bg-ciodaro-grey p-4 rounded-xl border border-zinc-800 gap-3">
            <div>
                <h1 class="text-xl font-black text-ciodaro-yellow tracking-tight">CIODAROFITNESS</h1>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <div class="flex-1 bg-ciodaro-black px-3 py-2 rounded-lg border border-zinc-800 text-right">
                    <p class="text-[9px] text-zinc-500 uppercase font-bold">Caja Planes</p>
                    <h2 id="txt-caja-total" class="text-sm font-black text-zinc-400">$0</h2>
                </div>
            </div>
        </header>

        <button onclick="abrirExpedienteUnico(null)" class="w-full bg-ciodaro-yellow text-black font-black p-3 rounded-lg uppercase tracking-wider">➕ Nuevo Alumno</button>

        <div id="contenedor-clientes" class="space-y-2"></div>
    </div>

    <!-- MODAL EXPEDIENTE -->
    <div id="modal-expediente" class="fixed inset-0 bg-black/95 hidden flex items-start justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-ciodaro-grey w-full max-w-2xl rounded-xl border border-zinc-800 p-4 space-y-5 my-2">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
                <h2 id="expediente-titulo" class="text-base font-black text-ciodaro-yellow uppercase">Ficha del Alumno</h2>
                <button onclick="cerrarExpediente()" class="text-white text-xl">✕</button>
            </div>

            <!-- SECCIÓN 1: PERFIL (CORREGIDA) -->
            <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800 space-y-3">
                <h3 class="text-[11px] font-black text-ciodaro-yellow uppercase border-b border-zinc-800 pb-1">1. Perfil</h3>
                <form id="form-datos-basicos" class="flex flex-col gap-3">
                    <div class="flex flex-col"><label class="text-[9px] text-zinc-400 font-bold uppercase">Nombre</label>
                        <input type="text" id="ex-nombre" class="bg-ciodaro-input p-2 rounded text-sm text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col"><label class="text-[9px] text-zinc-400 font-bold uppercase">Edad</label>
                            <input type="number" id="ex-edad" class="bg-ciodaro-input p-2 rounded text-sm text-white">
                        </div>
                        <div class="flex flex-col"><label class="text-[9px] text-zinc-400 font-bold uppercase">Género</label>
                            <select id="ex-genero" class="bg-ciodaro-input p-2 rounded text-sm text-white"><option value="M">Masculino</option><option value="F">Femenino</option></select>
                        </div>
                    </div>
                    <input type="number" id="ex-cuota" placeholder="Costo Plan ($)" class="bg-ciodaro-input p-2 rounded text-sm text-white">
                    <button type="button" onclick="guardarDatosPerfil()" class="bg-zinc-800 text-ciodaro-yellow font-black p-3 rounded uppercase text-[11px]">💾 Guardar Perfil</button>
                </form>
            </section>

            <div id="bloques-historial-progresivo" class="space-y-5 hidden">
                <!-- SECCIÓN 2: PAGOS -->
                <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800">
                    <h3 class="text-[11px] font-black text-emerald-400 uppercase border-b border-zinc-800 pb-1">2. Pagos</h3>
                    <form id="form-pago" onsubmit="agregarPago(event)" class="flex gap-2 mt-2">
                        <input type="date" id="pago-fecha" class="bg-ciodaro-input p-1 rounded text-white text-xs">
                        <input type="number" id="pago-monto" placeholder="$" class="bg-ciodaro-input p-1 rounded text-white text-xs w-16">
                        <button class="bg-emerald-600 px-3 rounded text-black font-black uppercase text-[10px]">+</button>
                    </form>
                    <div id="lista-pagos-recientes" class="mt-2 text-xs text-zinc-300"></div>
                </section>

                <!-- SECCIÓN 3: MÉTRICAS (HISTORIAL COMPLETO) -->
                <section class="bg-ciodaro-black/40 p-3 rounded-xl border border-zinc-800">
                    <h3 class="text-[11px] font-black text-ciodaro-yellow uppercase border-b border-zinc-800 pb-1">3. Métricas (Registro Completo)</h3>
                    <form id="form-medidas-unico" onsubmit="agregarMetrica(event)" class="grid grid-cols-2 gap-2 text-[10px] mt-2">
                        <input type="date" id="m-fecha" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-peso" placeholder="Peso kg" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-cintura" placeholder="Cintura cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-cuello" placeholder="Cuello cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-torax" placeholder="Tórax cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-biceps" placeholder="Bíceps cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-gluteos" placeholder="Glúteo cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <input type="number" step="0.1" id="m-cuadriceps" placeholder="Muslo cm" class="bg-ciodaro-input p-1 rounded text-white">
                        <button class="col-span-2 bg-ciodaro-yellow text-black font-black p-2 rounded uppercase text-[10px]">💾 Añadir Registro</button>
                    </form>
                    <div id="lista-metrics-progresivas" class="space-y-3 mt-4"></div>
                </section>
            </div>
        </div>
    </div>

    <script>
        let baseClientes = JSON.parse(localStorage.getItem('ciodaro_fitness_db')) || [];
        let clienteActualIndex = null;

        function abrirExpedienteUnico(index) {
            clienteActualIndex = index;
            document.getElementById('modal-expediente').classList.remove('hidden');
            if (index !== null) {
                let c = baseClientes[index];
                document.getElementById('ex-nombre').value = c.nombre;
                document.getElementById('ex-edad').value = c.edad;
                document.getElementById('ex-genero').value = c.genero;
                document.getElementById('ex-cuota').value = c.cuota;
                document.getElementById('bloques-historial-progresivo').classList.remove('hidden');
                renderizarSeccionesInternas();
            } else {
                document.getElementById('form-datos-basicos').reset();
                document.getElementById('bloques-historial-progresivo').classList.add('hidden');
            }
        }

        function cerrarExpediente() { document.getElementById('modal-expediente').classList.add('hidden'); renderizar(); }

        function guardarDatosPerfil() {
            let datos = { 
                nombre: document.getElementById('ex-nombre').value, 
                edad: document.getElementById('ex-edad').value, 
                genero: document.getElementById('ex-genero').value, 
                cuota: parseFloat(document.getElementById('ex-cuota').value) || 0,
                pagosHistorial: clienteActualIndex !== null ? baseClientes[clienteActualIndex].pagosHistorial : [],
                mediciones: clienteActualIndex !== null ? baseClientes[clienteActualIndex].mediciones : []
            };
            if(clienteActualIndex === null) { baseClientes.push(datos); clienteActualIndex = baseClientes.length - 1; }
            else { baseClientes[clienteActualIndex] = {...baseClientes[clienteActualIndex], ...datos}; }
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            document.getElementById('bloques-historial-progresivo').classList.remove('hidden');
            renderizarSeccionesInternas();
        }

        function agregarPago(e) { e.preventDefault();
            baseClientes[clienteActualIndex].pagosHistorial.push({fecha: document.getElementById('pago-fecha').value, monto: parseFloat(document.getElementById('pago-monto').value)});
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            renderizarSeccionesInternas();
        }

        function agregarMetrica(e) { e.preventDefault();
            baseClientes[clienteActualIndex].mediciones.push({
                fecha: document.getElementById('m-fecha').value, peso: document.getElementById('m-peso').value,
                cintura: document.getElementById('m-cintura').value, cuello: document.getElementById('m-cuello').value,
                torax: document.getElementById('m-torax').value, biceps: document.getElementById('m-biceps').value,
                gluteos: document.getElementById('m-gluteos').value, cuadriceps: document.getElementById('m-cuadriceps').value
            });
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes));
            renderizarSeccionesInternas();
        }

        function renderizarSeccionesInternas() {
            let c = baseClientes[clienteActualIndex];
            document.getElementById('lista-pagos-recientes').innerHTML = c.pagosHistorial.map(p => `<div class="flex justify-between"><span>${p.fecha}</span><span class="text-emerald-400">$${p.monto}</span></div>`).join('');
            document.getElementById('lista-metrics-progresivas').innerHTML = c.mediciones.map((m, i) => `
                <div class="bg-ciodaro-black p-3 rounded border border-zinc-800 text-[11px] space-y-2">
                    <div class="border-b border-zinc-700 pb-1 text-ciodaro-yellow font-black">📅 Evaluación: ${m.fecha}</div>
                    <div class="grid grid-cols-3 gap-2 text-zinc-300">
                        <div><b>Peso:</b> ${m.peso}kg</div><div><b>Cintura:</b> ${m.cintura}cm</div>
                        <div><b>Cuello:</b> ${m.cuello || '-'}cm</div><div><b>Tórax:</b> ${m.torax || '-'}cm</div>
                        <div><b>Bíceps:</b> ${m.biceps || '-'}cm</div><div><b>Glúteo:</b> ${m.gluteos || '-'}cm</div>
                        <div><b>Muslo:</b> ${m.cuadriceps || '-'}cm</div>
                    </div>
                </div>
            `).join('');
        }

        function renderizar() {
            let total = baseClientes.reduce((acc, c) => acc + (c.cuota || 0), 0);
            document.getElementById('txt-caja-total').innerText = `$${total}`;
            document.getElementById('contenedor-clientes').innerHTML = baseClientes.map((c, i) => `
                <div class="bg-ciodaro-grey p-4 rounded-lg border border-zinc-800 flex justify-between items-center">
                    <h3 class="font-black text-sm">${c.nombre}</h3>
                    <button onclick="abrirExpedienteUnico(${i})" class="bg-zinc-800 text-ciodaro-yellow px-3 py-1 rounded text-xs font-black">📂 EXPEDIENTE</button>
                </div>
            `).join('');
        }
        window.onload = renderizar;
    </script>
</body>
</html>
