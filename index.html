<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness | Gestión Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="p-6 border-b border-slate-800 glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter">CIODAROFITNESS<span class="text-slate-500">PRO</span></h1>
            <div id="reloj" class="text-slate-400 text-sm font-mono">10:26 AM</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 space-y-8">
        
        <!-- DASHBOARD DE MÉTRICAS -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-slate-400 text-xs uppercase mb-1">Total Recaudado</p>
                <h2 id="total-recaudado" class="text-3xl font-bold text-white">$0.00</h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-slate-400 text-xs uppercase mb-1">Meta del Mes</p>
                <input type="number" id="meta-objetivo" value="1200" oninput="actualizarDashboard()" class="bg-transparent text-2xl font-bold text-blue-400 w-full outline-none">
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-slate-400 text-xs uppercase mb-1">Progreso</p>
                <h2 id="porcentaje-meta" class="text-3xl font-bold text-emerald-400">0%</h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-slate-400 text-xs uppercase mb-1">Comparativa vs Mes Anterior</p>
                <h2 id="crecimiento" class="text-3xl font-bold text-orange-500">+8.5%</h2>
            </div>
        </section>

        <!-- FILTROS Y BÚSQUEDA -->
        <div class="flex gap-4 items-center">
            <input type="text" id="buscador" onkeyup="filtrarClientes()" placeholder="🔍 Buscar cliente en la base de datos..." class="flex-1 p-4 bg-slate-900 border border-slate-800 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
            <button onclick="exportarDatos()" class="p-4 bg-slate-800 rounded-xl hover:bg-slate-700">💾</button>
        </div>

        <!-- TABLA DE GESTIÓN AVANZADA -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-slate-950 text-slate-400 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="p-6">Cliente / Alumno</th>
                        <th class="p-6">Historial Pago</th>
                        <th class="p-6">Cuota Mensual</th>
                        <th class="p-6 text-center">Estado Actual</th>
                    </tr>
                </thead>
                <tbody id="lista-clientes">
                    <!-- FILA EJEMPLO (Copia y pega esto 28 veces) -->
                    <tr class="fila-cliente border-b border-slate-800 hover:bg-slate-800/50 transition">
                        <td class="p-6 font-semibold nombre-cliente">Angie Chavarría</td>
                        <td class="p-6 text-sm text-slate-400">Pagó puntual (Julio)</td>
                        <td class="p-6">
                            <input type="number" class="cuota-cliente bg-slate-950 border border-slate-800 w-20 p-2 rounded" value="50" oninput="actualizarDashboard()">
                        </td>
                        <td class="p-6 text-center">
                            <input type="checkbox" class="estado-pago w-6 h-6 accent-orange-500" onchange="actualizarDashboard()">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function actualizarDashboard() {
            let filas = document.getElementsByClassName('fila-cliente');
            let total = 0;
            let meta = parseFloat(document.getElementById('meta-objetivo').value) || 1;

            for(let f of filas) {
                if(f.querySelector('.estado-pago').checked) {
                    total += parseFloat(f.querySelector('.cuota-cliente').value || 0);
                    f.classList.add('bg-orange-900/10');
                } else {
                    f.classList.remove('bg-orange-900/10');
                }
            }
            
            document.getElementById('total-recaudado').innerText = "$" + total.toLocaleString();
            let porc = (total / meta) * 100;
            document.getElementById('porcentaje-meta').innerText = Math.round(porc) + "%";
        }

        function filtrarClientes() {
            let val = document.getElementById('buscador').value.toLowerCase();
            let filas = document.getElementsByClassName('fila-cliente');
            for(let f of filas) {
                let nombre = f.querySelector('.nombre-cliente').innerText.toLowerCase();
                f.style.display = nombre.includes(val) ? "" : "none";
            }
        }

        window.onload = actualizarDashboard;
    </script>
</body>
</html>
