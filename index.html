<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness - Panel de Control Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans pb-12">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <h1 class="text-xl font-bold tracking-wider text-orange-500">CIODAROFITNESS<span class="text-white text-sm font-normal">app</span></h1>
            <span class="bg-green-500/20 text-green-400 text-xs px-2.5 py-1 rounded-full border border-green-500/30 font-medium">Panel Activo</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <section class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-sm">
                <div class="flex justify-between items-center text-gray-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Clientes Activos</span>
                    <i data-lucide="users" class="w-4 h-4 text-orange-500"></i>
                </div>
                <div class="text-2xl font-bold text-white" id="stat-clientes">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-sm">
                <div class="flex justify-between items-center text-gray-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Ingresos Mensuales</span>
                    <i data-lucide="dollar-sign" class="w-4 h-4 text-orange-500"></i>
                </div>
                <div class="text-2xl font-bold text-white" id="stat-ingressos">$0.00</div>
            </div>
        </section>

        <section class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-lg space-y-4">
            <div class="flex items-center space-x-2 text-orange-500 font-bold border-b border-gray-700 pb-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <h2 class="text-lg">Registrar Atleta Inteligente</h2>
            </div>

            <form id="form-cliente" class="space-y-4">
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej. Juan Pérez" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">Número de WhatsApp</label>
                        <input type="tel" id="telefono" required placeholder="Ej. 584123456789" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">Costo Paquete ($)</label>
                            <input type="number" id="pago" required placeholder="Ej. 50" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">Fecha de Inicio</label>
                            <input type="date" id="fechainicio" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-900/50 p-3 rounded-xl border border-gray-700/60 space-y-3">
                    <div class="flex items-center space-x-1.5 text-xs font-bold text-gray-300 uppercase tracking-wider border-b border-gray-700/50 pb-1">
                        <i data-lucide="activity" class="w-3.5 h-3.5 text-orange-400"></i>
                        <span>Evaluación Antropométrica Inicial</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2.5">
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Peso Corporal (kg)</label>
                            <input type="number" step="0.1" id="peso" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Estatura (cm)</label>
                            <input type="number" id="estatura" placeholder="170" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Perímetro Pecho (cm)</label>
                            <input type="number" step="0.1" id="pecho" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Cintura (cm)</label>
                            <input type="number" step="0.1" id="cintura" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Brazo Izquierdo (cm)</label>
                            <input type="number" step="0.1" id="brazo_izq" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Brazo Derecho (cm)</label>
                            <input type="number" step="0.1" id="brazo_der" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Cadera (cm)</label>
                            <input type="number" step="0.1" id="cadera" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                        <div>
                            <label class="block text-[11px] text-gray-400 mb-0.5">Muslo Promedio (cm)</label>
                            <input type="number" step="0.1" id="muslo" placeholder="0.0" class="w-full bg-gray-900 border border-gray-700 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:border-orange-500 text-white">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 px-4 rounded-lg mt-2 transition duration-200 flex items-center justify-center space-x-2 text-sm">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span>Agregar a la Base de Datos</span>
                </button>
            </form>
        </section>

        <section class="space-y-3">
            <div class="flex items-center space-x-2 text-gray-300 font-bold px-1">
                <i data-lucide="clipboard-list" class="w-5 h-5 text-orange-500"></i>
                <h2>Control de Clientes y Antropometría</h2>
            </div>

            <div id="lista-clientes" class="space-y-3">
                <div id="sin-clientesMsg" class="text-center py-8 text-gray-500 text-sm bg-gray-800/50 rounded-xl border border-dashed border-gray-700">
                    No hay atletas registrados en este dispositivo.
                </div>
            </div>
        </section>
    </main>

    <script>
        // Arreglo de base de datos simulada que se guarda en el navegador (LocalStorage)
        let clientes = JSON.parse(localStorage.getItem('ciodaro_clientes')) || [];

        const form = document.getElementById('form-cliente');
        const listaContenedor = document.getElementById('lista-clientes');
        const sinClientesMsg = document.getElementById('sin-clientesMsg');

        // Establecer la fecha de hoy automáticamente en el formulario
        document.getElementById('fechainicio').value = new Date().toISOString().split('T')[0];

        // Función para calcular IMC
        function calcularIMC(peso, estatura) {
            if (!peso || !estatura) return null;
            const estaturaMetros = estatura / 100;
            return (peso / (estaturaMetros * estaturaMetros)).toFixed(1);
        }

        // Función para renderizar los componentes e iconos de la lista
        function renderApp() {
            listaContenedor.innerHTML = '';
            
            if (clientes.length === 0) {
                listaContenedor.appendChild(sinClientesMsg);
                document.getElementById('stat-clientes').innerText = '0';
                document.getElementById('stat-ingressos').innerText = '$0.00';
                return;
            }

            if (sinClientesMsg.parentNode) {
                sinClientesMsg.remove();
            }

            let totalIngresos = 0;

            clientes.forEach((cliente, index) => {
                totalIngresos += parseFloat(cliente.pago);

                const imc = calcularIMC(cliente.peso, cliente.estatura);
                
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md space-y-3";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start border-b border-gray-700/60 pb-2">
                        <div>
                            <h3 class="font-bold text-white text-base">${cliente.nombre}</h3>
                            <div class="flex items-center space-x-2 text-xs text-gray-400 mt-0.5">
                                <span class="flex items-center"><i data-lucide="calendar" class="w-3 h-3 mr-1 text-gray-500"></i>Ciclo: ${cliente.fechainicio}</span>
                                <a href="https://wa.me/${cliente.telefono}" target="_blank" class="text-orange-400 flex items-center hover:underline"><i data-lucide="phone" class="w-3 h-3 mr-0.5"></i>WhatsApp</a>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-green-400 font-bold text-sm block">$${parseFloat(cliente.pago).toFixed(2)}</span>
                            <span class="bg-green-500/10 text-green-400 text-[10px] px-2 py-0.5 rounded-full border border-green-500/20 inline-block mt-1">Activo (30d)</span>
                        </div>
                    </div>

                    <div class="bg-gray-900/60 p-2.5 rounded-lg text-xs space-y-2">
                        <div class="flex justify-between text-gray-400 font-medium border-b border-gray-800 pb-1">
                            <span>MEDIDAS: ${cliente.peso || '-'} kg | ${cliente.estatura || '-'} cm</span>
                            <span class="text-orange-400 font-bold">${imc ? 'IMC: ' + imc : 'IMC: -'}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-y-1 gap-x-2 text-gray-300">
                            <div><span class="text-gray-500">Pecho:</span> ${cliente.pecho || '-'}cm</div>
                            <div><span class="text-gray-500">Cintura:</span> ${cliente.cintura || '-'}cm</div>
                            <div><span class="text-gray-500">Cadera:</span> ${cliente.cadera || '-'}cm</div>
                            <div><span class="text-gray-500">B. Izq:</span> ${cliente.brazo_izq || '-'}cm</div>
                            <div><span class="text-gray-500">B. Der:</span> ${cliente.brazo_der || '-'}cm</div>
                            <div><span class="text-gray-500">Muslo:</span> ${cliente.muslo || '-'}cm</div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-1">
                        <button onclick="enviarMensaje(${index})" class="bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold py-2 px-3 rounded-lg flex items-center space-x-1 transition w-full justify-center mr-2">
                            <i data-lucide="message-square" class="w-3.5 h-3.5 text-orange-400"></i>
                            <span>Notificar Registro</span>
                        </button>
                        <button onclick="eliminarCliente(${index})" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 p-2 rounded-lg transition" title="Eliminar Atleta">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
                listaContenedor.appendChild(card);
            }
            
            // Actualizar Métricas Superiores
            document.getElementById('stat-clientes').innerText = clientes.length;
            document.getElementById('stat-ingressos').innerText = `$${totalIngresos.toFixed(2)}`;
            
            // Recargar iconos de Lucide en tiempo real
            lucide.createIcons();
        }

        // Lógica para capturar formulario y guardar datos
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const nuevoCliente = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                pago: document.getElementById('pago').value,
                fechainicio: document.getElementById('fechainicio').value,
                // Datos Antropométricos
                peso: document.getElementById('peso').value,
                estatura: document.getElementById('estatura').value,
                pecho: document.getElementById('pecho').value,
                cintura: document.getElementById('cintura').value,
                brazo_izq: document.getElementById('brazo_izq').value,
                brazo_der: document.getElementById('brazo_der').value,
                cadera: document.getElementById('cadera').value,
                muslo: document.getElementById('muslo').value
            };

            clientes.push(nuevoCliente);
            localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
            
            form.reset();
            document.getElementById('fechainicio').value = new Date().toISOString().split('T')[0];
            renderApp();
        });

        // Función para eliminar atletas
        window.eliminarCliente = function(index) {
            if(confirm('¿Seguro que deseas eliminar este atleta del sistema?')) {
                clientes.splice(index, 1);
                localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
                renderApp();
            }
        }

        // Función para enviar notificación inteligente por WhatsApp
        window.enviarMensaje = function(index) {
            const c = clientes[index];
            const imc = calcularIMC(c.peso, c.estatura);
            let texto = `¡Hola *${c.nombre}*! Tu registro en *Ciodarofitness* está activo.\n\n`;
            texto += `*Plan Actual:* Inteligente Especializado\n`;
            texto += `*Fecha de Inicio:* ${c.fechainicio}\n\n`;
            if (c.peso || c.cintura) {
                texto += `*Evaluación Antropométrica Inicial:*\n`;
                if(c.peso) texto += `- Peso: ${c.peso} kg (IMC: ${imc || '-'})\n`;
                if(c.cintura) texto += `- Cintura: ${c.cintura} cm\n`;
                if(c.brazo_der) texto += `- Brazo Der: ${c.brazo_der} cm\n`;
                texto += `\n¡Vamos a entrenar de forma inteligente para lograr los mejores resultados biomecánicos! 🧬💪`;
            }
            
            const url = `https://wa.me/${c.telefono}?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        // Ejecutar carga inicial al abrir el panel
        renderApp();
    </script>
</body>
</html>
