<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ciodarofitness Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .inv-card { background: #09090b; border: 1px solid #18181b; border-radius: 12px; padding: 16px; }
        .inv-input { background: #000; border: 1px solid #27272a; padding: 8px; border-radius: 6px; width: 100%; color: #fff; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- HEADER GLOBAL -->
    <header class="inv-card flex justify-between items-center mb-4">
        <h1 class="font-black text-yellow-500">CIODAROFITNESS</h1>
        <div class="text-right">
            <p class="text-[9px] text-zinc-500 uppercase">Caja Total</p>
            <span id="txt-caja-global" class="font-black text-emerald-500 text-lg">$0</span>
        </div>
    </header>

    <input type="text" id="buscador" onkeyup="renderizar()" placeholder="🔍 Buscar alumno..." class="inv-input mb-4 text-sm">
    <button onclick="abrirModal(null)" class="w-full bg-yellow-500 text-black font-black p-3 rounded-xl mb-6 uppercase text-sm">➕ Nuevo Alumno</button>

    <div id="lista-alumnos" class="space-y-3"></div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black hidden p-4 overflow-y-auto">
        <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-zinc-500 mb-4">✕ Cerrar</button>
        <div class="space-y-4">
            <input type="text" id="ex-nombre" placeholder="Nombre" class="inv-input">
            
            <div class="inv-card">
                <h3 class="text-[10px] text-zinc-500 uppercase mb-2">Abonos</h3>
                <div class="flex gap-2 mb-2">
                    <input type="date" id="pago-f" class="inv-input text-[10px] w-1/2">
                    <input type="number" id="pago-m" placeholder="$" class="inv-input w-1/4">
                    <button onclick="addPago()" class="bg-emerald-600 px-4 rounded font-black">+</button>
                </div>
                <div id="historial-pagos" class="text-xs space-y-1"></div>
            </div>

            <div class="inv-card">
                <h3 class="text-[10px] text-zinc-500 uppercase mb-2">Métricas (IMC y Grasa)</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <input type="number" id="m-peso" placeholder="Peso kg" class="inv-input">
                    <input type="number" id="m-talla" placeholder="Altura cm" class="inv-input">
                    <input type="number" id="m-cuello" placeholder="Cuello cm" class="inv-input">
                    <input type="number" id="m-cintura" placeholder="Cintura cm" class="inv-input">
                </div>
                <button onclick="addMetrica()" class="w-full bg-yellow-500 text-black font-black p-2 rounded mt-2 uppercase text-[10px]">Calcular y Guardar</button>
                <div id="historial-metrics" class="mt-4 text-xs space-y-1"></div>
            </div>
            <button onclick="guardar()" class="w-full bg-zinc-800 p-3 rounded-xl font-bold uppercase text-xs">Guardar Cliente</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ciodaro_fitness_db')) || [];
        let cur = null;

        function renderizar() {
            let total = 0;
            db.forEach(c => (c.pagos||[]).forEach(p => total += parseFloat(p.m || 0)));
            document.getElementById('txt-caja-global').innerText = `$${total}`;
            
            let term = document.getElementById('buscador').value.toLowerCase();
            document.getElementById('lista-alumnos').innerHTML = db.filter(c => c.nombre.toLowerCase().includes(term)).map((c, i) => `
                <div class="inv-card flex justify-between items-center">
                    <span class="font-bold text-sm">${c.nombre}</span>
                    <button onclick="abrirModal(${i})" class="bg-zinc-900 px-3 py-1 rounded text-[10px]">📂 EXPEDIENTE</button>
                </div>
            `).join('');
        }

        function abrirModal(i) {
            cur = i;
            if(i !== null) {
                document.getElementById('ex-nombre').value = db[i].nombre;
                mostrarDatos();
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function addPago() {
            let m = document.getElementById('pago-m').value;
            let f = document.getElementById('pago-f').value;
            if(!db[cur].pagos) db[cur].pagos = [];
            db[cur].pagos.push({f, m});
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(db));
            mostrarDatos();
        }

        function addMetrica() {
            let p = parseFloat(document.getElementById('m-peso').value);
            let h = parseFloat(document.getElementById('m-talla').value)/100;
            let imc = (p/(h*h)).toFixed(1);
            if(!db[cur].met) db[cur].met = [];
            db[cur].met.push({f: new Date().toLocaleDateString(), imc});
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(db));
            mostrarDatos();
        }

        function mostrarDatos() {
            document.getElementById('historial-pagos').innerHTML = (db[cur].pagos||[]).map(p => `<div class="flex justify-between"><span>${p.f}</span><span class="text-emerald-500">+$${p.m}</span></div>`).join('');
            document.getElementById('historial-metrics').innerHTML = (db[cur].met||[]).map(m => `<div class="flex justify-between"><span>${m.f}</span><span>IMC: ${m.imc}</span></div>`).join('');
        }

        function guardar() {
            let nombre = document.getElementById('ex-nombre').value;
            if(cur === null) db.push({nombre, pagos:[], met:[]});
            else db[cur].nombre = nombre;
            localStorage.setItem('ciodaro_fitness_db', JSON.stringify(db));
            document.getElementById('modal').classList.add('hidden');
            renderizar();
        }
        window.onload = renderizar;
    </script>
</body>
</html>
