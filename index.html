<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CIODAROFITNESS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'custom-yellow': '#F59E0B', 'custom-black': '#09090b', 'custom-grey': '#27272a' } } } }
    </style>
</head>
<body class="bg-custom-black text-white min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- HEADER Y DASHBOARD -->
        <header class="mb-8 border-b border-zinc-800 pb-6">
            <h1 class="text-3xl font-black text-custom-yellow mb-6">CIODAROFITNESS PRO</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-custom-grey p-6 rounded-2xl border border-zinc-700">
                    <p class="text-zinc-400 uppercase text-xs font-bold mb-2">Total Caja Mensual</p>
                    <div class="flex items-center gap-4">
                        <h2 id="total-caja" class="text-4xl font-black text-custom-yellow">***</h2>
                        <button onclick="toggleDinero()" class="text-zinc-500 hover:text-white">👁️</button>
                    </div>
                </div>
                <div class="bg-custom-grey p-6 rounded-2xl border border-zinc-700 flex flex-col justify-center">
                    <input type="text" id="buscador" onkeyup="render()" placeholder="🔍 Buscar cliente..." class="bg-black border border-zinc-600 p-3 rounded-lg outline-none focus:border-custom-yellow">
                </div>
                <div class="bg-custom-grey p-6 rounded-2xl border border-zinc-700">
                    <button onclick="abrirModal()" class="w-full h-full bg-custom-yellow text-black font-bold rounded-xl hover:bg-yellow-500">➕ Agregar Nuevo Cliente</button>
                </div>
            </div>
        </header>

        <!-- LISTA -->
        <div id="lista-clientes" class="grid gap-4">
            <!-- Los clientes aparecerán aquí -->
        </div>
    </div>

    <!-- MODAL AGREGAR -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4">
        <div class="bg-custom-grey p-8 rounded-2xl w-full max-w-lg border border-zinc-700">
            <h2 class="text-xl font-bold mb-4 text-custom-yellow">Nuevo Alumno</h2>
            <input type="text" id="in-nombre" placeholder="Nombre" class="w-full bg-black p-3 mb-2 rounded border border-zinc-600">
            <input type="number" id="in-cuota" placeholder="Plan Mensual ($)" class="w-full bg-black p-3 mb-2 rounded border border-zinc-600">
            <input type="number" id="in-peso" placeholder="Peso (kg)" class="w-full bg-black p-3 mb-2 rounded border border-zinc-600">
            <button onclick="guardarCliente()" class="w-full bg-custom-yellow text-black font-bold p-3 rounded mt-4">Guardar</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full mt-2 text-zinc-400">Cancelar</button>
        </div>
    </div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('ciodaro_db')) || [];
        let dineroVisible = false;

        function guardarCliente() {
            let nuevo = {
                nombre: document.getElementById('in-nombre').value,
                cuota: document.getElementById('in-cuota').value,
                peso: document.getElementById('in-peso').value,
                pagado: false,
                imc: (document.getElementById('in-peso').value / 1.75**2).toFixed(1)
            };
            clientes.push(nuevo);
            localStorage.setItem('ciodaro_db', JSON.stringify(clientes));
            document.getElementById('modal').classList.add('hidden');
            render();
        }

        function toggleDinero() {
            dineroVisible = !dineroVisible;
            render();
        }

        function render() {
            let busqueda = document.getElementById('buscador').value.toLowerCase();
            let lista = document.getElementById('lista-clientes');
            let total = 0;
            lista.innerHTML = "";

            clientes.filter(c => c.nombre.toLowerCase().includes(busqueda)).forEach((c, index) => {
                if(c.pagado) total += parseFloat(c.cuota);
                lista.innerHTML += `
                    <div class="bg-custom-grey p-4 rounded-xl border border-zinc-700 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${c.nombre}</h3>
                            <p class="text-sm text-zinc-400">IMC: ${c.imc} | Plan: $${c.cuota}</p>
                        </div>
                        <div class="flex gap-2">
                            <input type="checkbox" ${c.pagado ? 'checked' : ''} onchange="togglePago(${index})" class="w-6 h-6 accent-custom-yellow">
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-caja').innerText = dineroVisible ? `$${total}` : '***';
        }

        function togglePago(index) {
            clientes[index].pagado = !clientes[index].pagado;
            localStorage.setItem('ciodaro_db', JSON.stringify(clientes));
            render();
        }

        function abrirModal() { document.getElementById('modal').classList.remove('hidden'); }
        window.onload = render;
    </script>
</body>
</html>
