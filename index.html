<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness - Panel Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans pb-12">

    <!-- Encabezado con Control de Visibilidad -->
    <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700/50 p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <h1 class="text-xl font-black tracking-wider text-orange-500">CIODAROFITNESS</h1>
            <button onclick="toggleVisibilidad()" class="p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition">
                <i id="icono-ojo" data-lucide="eye" class="w-5 h-5 text-orange-400"></i>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- Métricas -->
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <span class="text-xs text-slate-400 font-semibold uppercase">Clientes Activos</span>
                <div class="text-2xl font-bold" id="stat-clientes">0</div>
            </div>
            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <span class="text-xs text-slate-400 font-semibold uppercase">Ingresos Totales</span>
                <div class="text-2xl font-bold text-emerald-400" id="stat-ingresos">$0.00</div>
            </div>
        </section>

        <!-- Formulario (Se mantiene igual para no perder la agilidad) -->
        <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700/60 shadow-xl space-y-4">
            <h2 class="text-lg font-bold text-orange-500 border-b border-slate-700/60 pb-2">Registrar Atleta</h2>
            <form id="form-cliente" class="space-y-3">
                <input type="text" id="nombre" placeholder="Nombre completo" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white">
                <input type="tel" id="telefono" placeholder="WhatsApp (584...)" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white">
                <input type="number" id="total_paquete" placeholder="Total Paquete ($)" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white">
                <button type="submit" class="w-full bg-orange-500 py-2 rounded-lg font-bold text-sm">Registrar</button>
            </form>
        </section>

        <!-- Listado -->
        <div id="lista-clientes" class="space-y-4"></div>
    </main>

    <script>
        let clientes = JSON.parse(localStorage.getItem('ciodaro_clientes')) || [];
        let ocultar = false;

        function toggleVisibilidad() {
            ocultar = !ocultar;
            document.getElementById('icono-ojo').setAttribute('data-lucide', ocultar ? 'eye-off' : 'eye');
            lucide.createIcons();
            renderApp();
        }

        function renderApp() {
            const lista = document.getElementById('lista-clientes');
            lista.innerHTML = '';
            let totalGeneral = 0;

            clientes.forEach((c, idx) => {
                const totalPagado = (c.pagos || []).reduce((acc, p) => acc + parseFloat(p.monto), 0);
                totalGeneral += totalPagado;
                
                const card = document.createElement('div');
                card.className = "bg-slate-800 p-4 rounded-xl border border-slate-700/60";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-bold">${c.nombre}</h3>
                            <p class="text-xs text-slate-400">Total Acordado: ${ocultar ? '***' : '$' + c.total_paquete}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-slate-400">Pagado</p>
                            <p class="font-bold text-emerald-400">${ocultar ? '***' : '$' + totalPagado}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="registrarAbono(${idx})" class="flex-1 bg-emerald-600 text-xs py-1.5 rounded font-bold">+ Abono</button>
                        <button onclick="verResumen(${idx})" class="flex-1 bg-slate-700 text-xs py-1.5 rounded font-bold">Resumen</button>
                        <button onclick="eliminarCliente(${idx})" class="px-3 bg-red-900/50 text-red-400 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                lista.appendChild(card);
            });

            document.getElementById('stat-clientes').innerText = clientes.length;
            document.getElementById('stat-ingresos').innerText = ocultar ? '***' : '$' + totalGeneral.toFixed(2);
            lucide.createIcons();
        }

        window.registrarAbono = (idx) => {
            const monto = prompt("Monto del abono ($):");
            if(monto) {
                if(!clientes[idx].pagos) clientes[idx].pagos = [];
                clientes[idx].pagos.push({ fecha: new Date().toLocaleDateString(), monto: monto });
                localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
                renderApp();
            }
        };

        window.verResumen = (idx) => {
            const c = clientes[idx];
            let msg = `Historial de ${c.nombre}:\n`;
            (c.pagos || []).forEach(p => msg += `• ${p.fecha}: $${p.monto}\n`);
            alert(msg || "Sin pagos registrados.");
        };

        window.eliminarCliente = (idx) => {
            if(confirm("¿Eliminar atleta?")) {
                clientes.splice(idx, 1);
                localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
                renderApp();
            }
        };

        document.getElementById('form-cliente').addEventListener('submit', (e) => {
            e.preventDefault();
            clientes.push({
                nombre: document.getElementById('nombre').value,
                total_paquete: document.getElementById('total_paquete').value,
                pagos: []
            });
            localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
            e.target.reset();
            renderApp();
        });

        renderApp();
    </script>
</body>
</html>
