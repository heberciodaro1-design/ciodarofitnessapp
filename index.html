<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiodaroFitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; font-size: 14px; }
        .box { background: #09090b; border: 1px solid #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .input-dark { background: #18181b; border: 1px solid #3f3f46; padding: 10px; width: 100%; border-radius: 8px; color: #fff !important; font-size: 14px; margin-bottom: 8px; }
        ::placeholder { color: #71717a; }
        .btn { padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; text-transform: uppercase; width: 100%; }
        .comp-card { background: #18181b; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #eab308; }
        .hidden-monto { filter: blur(5px); pointer-events: none; user-select: none; }
    </style>
</head>
<body class="p-4">

    <header class="box">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="font-black text-yellow-500 text-xl tracking-tighter">CIODAROFITNESS</h1>
                <p id="total-alumnos" class="text-[10px] text-zinc-500 uppercase font-bold mt-1"></p>
            </div>
            <button onclick="toggleVisibility()" class="text-xs bg-zinc-800 px-3 py-1 rounded">👁️</button>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-4">
            <div><p class="text-[9px] text-zinc-500 uppercase">Planes</p><span id="val-planes" class="text-md font-black ${mostrar ? '' : 'hidden-monto'}">$0</span></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Recaudado</p><span id="val-recaudado" class="text-md font-black text-emerald-500 ${mostrar ? '' : 'hidden-monto'}">$0</span></div>
            <div><p class="text-[9px] text-zinc-500 uppercase">Faltante</p><span id="val-faltante" class="text-md font-black text-red-500 ${mostrar ? '' : 'hidden-monto'}">$0</span></div>
        </div>
    </header>

    <input type="text" id="busc" onkeyup="render()" placeholder="🔍 Buscar alumno..." class="input-dark">
    <button onclick="abrirModal(null)" class="btn bg-yellow-500 text-black mb-4">➕ Nuevo Alumno</button>

    <div id="lista" class="space-y-3"></div>

    <div id="modal" class="fixed inset-0 bg-black hidden p-4 overflow-y-auto z-50">
        <div class="flex justify-between mb-4">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-sm font-bold">✕ Cerrar</button>
            <button onclick="borrarCliente()" class="text-sm font-bold text-red-500">🗑️ BORRAR</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="ex-nom" placeholder="Nombre del Alumno" class="input-dark">
            <div class="grid grid-cols-3 gap-2">
                <input type="number" id="ex-edad" placeholder="E" class="input-dark">
                <input type="number" id="ex-peso" placeholder="P" class="input-dark">
                <input type="number" id="ex-est" placeholder="H" class="input-dark">
            </div>
            <div class="flex gap-2">
                <div class="relative w-full">
                    <input type="number" id="ex-plan" placeholder="Valor del Plan ($)" class="input-dark">
                    <button onclick="document.getElementById('ex-plan').value=''" class="absolute right-2 top-2 text-zinc-500 font-bold">✕</button>
                </div>
                <button onclick="pagoTotal()" class="btn bg-zinc-800 w-auto text-[10px]">PAGO TOTAL</button>
            </div>
            
            <div class="box">
                <h3 class="text-[10px] uppercase text-zinc-500 mb-2">Historial de Pagos</h3>
                <div class="flex gap-2">
                    <input type="date" id="pago-fecha" class="input-dark text-[10px]">
                    <input type="number" id="pago-monto" placeholder="$" class="input-dark">
                    <button onclick="agregarPago()" class="btn bg-emerald-600 w-auto">ADD</button>
                </div>
                <div id="hist-pagos" class="text-xs space-y-1"></div>
            </div>
            
            <div class="box">
                <h3 class="text-[10px] uppercase text-yellow-500 mb-3 border-b border-zinc-800 pb-2">ANTROPOMETRÍA</h3>
                <input type="date" id="m-fecha" class="input-dark text-[10px]">
                <input type="number" id="m-p" placeholder="Peso" class="input-dark">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="m-c" placeholder="Cuello" class="input-dark">
                    <input type="number" id="m-t" placeholder="Tórax" class="input-dark">
                    <input type="number" id="m-b" placeholder="Bíceps" class="input-dark">
                    <input type="number" id="m-cin" placeholder="Cintura" class="input-dark">
                    <input type="number" id="m-g" placeholder="Glúteos" class="input-dark">
                    <input type="number" id="m-cuad" placeholder="Cuád." class="input-dark">
                    <input type="number" id="m-pan" placeholder="Pantorrilla" class="input-dark">
                </div>
                <button onclick="guardarMetrica()" class="btn bg-yellow-500 text-black mt-2 text-[10px]">Guardar y Calcular</button>
                <h3 class="text-[10px] uppercase text-zinc-500 mt-6 mb-2">Historial Comparativo</h3>
                <div id="hist-met" class="mt-2 text-[11px] space-y-2"></div>
            </div>
            <button onclick="guardarCliente()" class="btn bg-zinc-800">GUARDAR TODO</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('ciodaro_db')) || [];
        let cur = null;
        let mostrar = false;

        function toggleVisibility() { mostrar = !mostrar; render(); }

        function render() {
            let busqueda = document.getElementById('busc').value.toLowerCase();
            
            let totalPlanes = db.reduce((a, b) => a + parseFloat(b.plan||0), 0);
            let totalRecaudado = db.reduce((a, b) => a + (b.pagos||[]).reduce((x, y) => x + parseFloat(y.monto||0), 0), 0);
            let totalFaltante = totalPlanes - totalRecaudado;
            
            document.getElementById('val-planes').innerText = `$${totalPlanes}`;
            document.getElementById('val-recaudado').innerText = `$${totalRecaudado}`;
            document.getElementById('val-faltante').innerText = `$${totalFaltante}`;
            document.getElementById('total-alumnos').innerText = `Alumnos: ${db.length}`;
            
            let listaFiltrada = db.filter(c => c.nom.toLowerCase().includes(busqueda)).sort((a, b) => {
                let sA = parseFloat(a.plan||0) - (a.pagos||[]).reduce((x, y) => x + parseFloat(y.monto||0), 0);
                let sB = parseFloat(b.plan||0) - (b.pagos||[]).reduce((x, y) => x + parseFloat(y.monto||0), 0);
                return (sB > 0) - (sA > 0);
            });
            
            document.getElementById('lista').innerHTML = listaFiltrada.map((c, i) => {
                let yaPagado = (c.pagos||[]).reduce((x, y) => x + parseFloat(y.monto||0), 0);
                let saldo = parseFloat(c.plan||0) - yaPagado;
                let textoSaldo = saldo <= 0 ? "Pagado (0)" : `Resta: $${saldo}`;
                let idxOriginal = db.indexOf(c);
                return `
                <div class="box flex justify-between items-center ${saldo > 0 ? 'border-red-900/50' : ''}">
                    <div>
                        <h3 class="font-bold text-sm">${c.nom}</h3>
                        <span class="text-[10px] ${saldo <= 0 ? 'text-emerald-500' : 'text-red-500'} font-bold ${mostrar ? '' : 'hidden-monto'}">${textoSaldo}</span>
                    </div>
                    <button onclick="abrirModal(${idxOriginal})" class="bg-zinc-900 px-3 py-2 rounded-lg font-bold text-[10px] border border-zinc-700">EXPEDIENTE</button>
                </div>
            `}).join('');
        }
        
        function abrirModal(i) {
            cur = i;
            if(i !== null) {
                document.getElementById('ex-nom').value = db[i].nom;
                document.getElementById('ex-edad').value = db[i].edad || '';
                document.getElementById('ex-plan').value = db[i].plan;
                document.getElementById('ex-peso').value = db[i].peso || '';
                document.getElementById('ex-est').value = db[i].est || '';
                renderPagos(); renderMetricas();
            } else { 
                document.getElementById('ex-nom').value = ''; document.getElementById('ex-edad').value = ''; document.getElementById('ex-peso').value = ''; document.getElementById('ex-est').value = ''; document.getElementById('ex-plan').value = ''; document.getElementById('hist-pagos').innerHTML = ''; document.getElementById('hist-met').innerHTML = '';
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function pagoTotal() {
            if(cur === null) { guardarCliente(); }
            let plan = parseFloat(document.getElementById('ex-plan').value || 0);
            let yaPagado = (db[cur].pagos||[]).reduce((x, y) => x + parseFloat(y.monto||0), 0);
            let restante = plan - yaPagado;
            if(restante > 0) {
                if(!db[cur].pagos) db[cur].pagos = [];
                db[cur].pagos.push({fecha: new Date().toISOString().split('T')[0], monto: restante});
                localStorage.setItem('ciodaro_db', JSON.stringify(db));
                renderPagos(); render();
            }
        }

        function agregarPago() {
            if(cur === null) { guardarCliente(); }
            let monto = parseFloat(document.getElementById('pago-monto').value);
            let fecha = document.getElementById('pago-fecha').value;
            if(isNaN(monto) || !fecha) return;
            if(!db[cur].pagos) db[cur].pagos = [];
            db[cur].pagos.push({fecha, monto});
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            renderPagos(); render();
        }

        function borrarPago(idx) { db[cur].pagos.splice(idx, 1); localStorage.setItem('ciodaro_db', JSON.stringify(db)); renderPagos(); render(); }

        function renderPagos() {
            document.getElementById('hist-pagos').innerHTML = (db[cur].pagos||[]).map((p, i) => `<div class="flex justify-between border-b border-zinc-900 py-1"><span>${p.fecha}: $${p.monto}</span><button onclick="borrarPago(${i})" class="text-red-500">🗑️</button></div>`).join('');
        }

        function guardarMetrica() {
            if(cur === null) { guardarCliente(); }
            let p = parseFloat(document.getElementById('m-p').value) || parseFloat(document.getElementById('ex-peso').value);
            let h = parseFloat(document.getElementById('ex-est').value) / 100;
            let fecha = document.getElementById('m-fecha').value || new Date().toISOString().split('T')[0];
            let met = {
                fecha: fecha,
                p: document.getElementById('m-p').value,
                c: document.getElementById('m-c').value, t: document.getElementById('m-t').value,
                b: document.getElementById('m-b').value, cin: document.getElementById('m-cin').value,
                g: document.getElementById('m-g').value, cuad: document.getElementById('m-cuad').value,
                pan: document.getElementById('m-pan').value,
                imc: (p && h) ? (p / (h * h)).toFixed(1) : 0
            };
            if(!db[cur].met) db[cur].met = [];
            db[cur].met.push(met);
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            renderMetricas();
        }

        function borrarMetrica(idx) { db[cur].met.splice(idx, 1); localStorage.setItem('ciodaro_db', JSON.stringify(db)); renderMetricas(); }

        function editarMetrica(idx) {
            let m = db[cur].met[idx];
            document.getElementById('m-fecha').value = m.fecha;
            document.getElementById('m-p').value = m.p;
            document.getElementById('m-c').value = m.c;
            document.getElementById('m-t').value = m.t;
            document.getElementById('m-b').value = m.b;
            document.getElementById('m-cin').value = m.cin;
            document.getElementById('m-g').value = m.g;
            document.getElementById('m-cuad').value = m.cuad;
            document.getElementById('m-pan').value = m.pan;
            db[cur].met.splice(idx, 1);
            localStorage.setItem('ciodaro_db', JSON.stringify(db));
            renderMetricas();
        }

        function renderMetricas() {
            document.getElementById('hist-met').innerHTML = (db[cur].met||[]).map((m, i) => `<div class="comp-card">
                <div class="flex justify-between font-bold text-yellow-500 mb-1">
                    <span>FECHA: ${m.fecha}</span>
                    <div class="flex flex-col items-end">
                        <button onclick="borrarMetrica(${i})" class="text-red-500 text-[10px]">ELIMINAR</button>
                        <button onclick="editarMetrica(${i})" class="text-blue-400 text-[10px]">EDITAR</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-1 text-[11px]">
                    <span>PESO: <b>${m.p || '-'}</b></span> <span>IMC: <b>${m.imc}</b></span>
                    <span>C: <b>${m.c}</b></span> <span>T: <b>${m.t}</b></span>
                    <span>B: <b>${m.b}</b></span> <span>CI: <b>${m.cin}</b></span>
                    <span>G: <b>${m.g}</b></span> <span>CU: <b>${m.cuad}</b></span>
                    <span>PAN: <b>${m.pan}</b></span> <span></span>
                </div>
            </div>`).join('');
        }

        function borrarCliente() { if(confirm('¿Borrar?')) { db.splice(cur, 1); localStorage.setItem('ciodaro_db', JSON.stringify(db)); document.getElementById('modal').classList.add('hidden'); render(); } }

        function guardarCliente() {
            let datos = { nom: document.getElementById('ex-nom').value, edad: document.getElementById('ex-edad').value, plan: document.getElementById('ex-plan').value, peso: document.getElementById('ex-peso').value, est: document.getElementById('ex-est').value };
            if(cur === null) { db.push({...datos, pagos: [], met: []}); cur = db.length - 1; } 
            else { db[cur] = {...db[cur], ...datos}; }
            localStorage.setItem('ciodaro_db', JSON.stringify(db)); render();
        }
        window.onload = render;
    </script>
</body>
</html>
