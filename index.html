<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitnesspage - Coach Dashboard</title>
    <!-- Tailwind CSS para un diseño moderno y rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos de la app -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans pb-12">

    <!-- Encabezado de la App -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <h1 class="text-xl font-bold tracking-wider text-orange-500">CIODAROFITNESS<span class="text-white text-sm font-normal">page</span></h1>
            <span class="bg-green-500/20 text-green-400 text-xs px-2.5 py-1 rounded-full border border-green-500/30 font-medium">Panel Activo</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- SECCIÓN 1: METRICAS EN TIEMPO REAL -->
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-sm">
                <div class="flex justify-between items-start text-gray-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Clientes Activos</span>
                    <i data-lucide="users" class="w-4 h-4 text-orange-500"></i>
                </div>
                <div class="text-2xl font-bold text-white" id="stat-clientes">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-sm">
                <div class="flex justify-between items-start text-gray-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Ingresos Mensuales</span>
                    <i data-lucide="dollar-sign" class="w-4 h-4 text-green-400"></i>
                </div>
                <div class="text-2xl font-bold text-white" id="stat-ingresos">$0.00</div>
            </div>
        </section>

        <!-- SECCIÓN 2: FORMULARIO PARA REGISTRAR CLIENTE -->
        <section class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-lg space-y-4">
            <div class="flex items-center space-x-2 text-orange-500 font-bold border-b border-gray-700 pb-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <h2>Registrar Nuevo Cliente</h2>
            </div>
            
            <form id="form-cliente" class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-400 font-medium mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                </div>
                
                <div>
                    <label class="block text-xs text-gray-400 font-medium mb-1">Número de WhatsApp (con código de país)</label>
                    <input type="tel" id="telefono" required placeholder="Ej. 584123456789" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">Costo del Paquete ($)</label>
                        <input type="number" id="pago" required placeholder="Ej. 50" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">Fecha de Inicio</label>
                        <input type="date" id="fechaInicio" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 text-white">
                    </div>
                </div>

                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 px-4 rounded-lg text-sm mt-2 transition duration-200 flex items-center justify-center space-x-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span>Agregar a la Base de Datos</span>
                </button>
            </form>
        </section>

        <!-- SECCIÓN 3: LISTADO Y CONTROL DE CLIENTES -->
        <section class="space-y-3">
            <div class="flex items-center space-x-2 text-gray-300 font-bold px-1">
                <i data-lucide="clipboard-list" class="w-5 h-5 text-orange-500"></i>
                <h2>Control de Clientes y Vencimientos</h2>
            </div>

            <!-- Contenedor dinámico donde se agregan los clientes -->
            <div id="lista-clientes" class="space-y-3">
                <!-- Mensaje cuando está vacío -->
                <div id="sin-clientes" class="text-center py-8 text-gray-500 text-sm bg-gray-800/50 rounded-xl border border-dashed border-gray-700">
                    No hay clientes registrados en este dispositivo.
                </div>
            </div>
        </section>

    </main>

    <!-- SISTEMA DE LÓGICA EN JAVASCRIPT -->
    <script>
        // Arreglo de base de datos simulada que se guarda en el navegador (LocalStorage)
        let clientes = JSON.parse(localStorage.getItem('ciodaro_clientes')) || [];

        const form = document.getElementById('form-cliente');
        const listaContenedor = document.getElementById('lista-clientes');
        const sinClientesMsg = document.getElementById('sin-clientes');

        // Establecer la fecha de hoy automáticamente en el formulario
        document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];

        // Función para renderizar los componentes e iconos de la lista
        function actualizarInterfaz() {
            listaContenedor.innerHTML = '';
            
            if (clientes.length === 0) {
                listaContenedor.appendChild(sinClientesMsg);
                document.getElementById('stat-clientes').innerText = "0";
                document.getElementById('stat-ingresos').innerText = "$0.00";
                lucide.createIcons();
                return;
            }

            let totalIngresos = 0;
            let activosContador = 0;

            clientes.forEach((cliente, index) => {
                totalIngresos += parseFloat(cliente.pago);
                activosContador++;

                // Calcular fecha de vencimiento (Fecha inicio + 30 días)
                const fInicio = new Date(cliente.fechaInicio + 'T00:00:00');
                const fVencimiento = new Date(fInicio);
                fVencimiento.setDate(fVencimiento.getDate() + 30);

                const hoy = new Date();
                hoy.setHours(0,0,0,0);

                // Calcular días restantes para vencer
                const diferenciaTiempo = fVencimiento.getTime() - hoy.getTime();
                const diasRestantes = Math.ceil(diferenciaTiempo / (1000 * 60 * 60 * 24));

                // Determinar el estatus visual del paquete
                let statusBadge = "";
                let alertClass = "border-gray-700 bg-gray-800";
                
                if (diasRestantes < 0) {
                    statusBadge = `<span class="bg-red-500/20 text-red-400 border border-red-500/30 text-xs px-2 py-0.5 rounded-md font-bold">Vencido (${Math.abs(diasRestantes)}d)</span>`;
                    alertClass = "border-red-500/40 bg-red-950/20";
                } else if (diasRestantes <= 3) {
                    statusBadge = `<span class="bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 text-xs px-2 py-0.5 rounded-md font-bold">Por Vencer (${diasRestantes}d)</span>`;
                    alertClass = "border-yellow-500/40 bg-yellow-950/20";
                } else {
                    statusBadge = `<span class="bg-green-500/20 text-green-400 border border-green-500/30 text-xs px-2 py-0.5 rounded-md font-bold">Activo (${diasRestantes}d)</span>`;
                }

                // Dar formato de lectura a las fechas
                const opcionesFecha = { day: 'numeric', month: 'short' };
                const fInicioStr = fInicio.toLocaleDateString('es-ES', opcionesFecha);
                const fVencStr = fVencimiento.toLocaleDateString('es-ES', opcionesFecha);

                // Crear elemento visual del cliente
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border ${alertClass} transition duration-200 flex flex-col space-y-3`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-white text-base">${cliente.nombre}</h3>
                            <p class="text-xs text-gray-400 flex items-center mt-0.5">
                                <i data-lucide="calendar" class="w-3 h-3 mr-1 text-gray-500"></i>
                                Ciclo: ${fInicioStr} al ${fVencStr}
                            </p>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-bold text-emerald-400">$${parseFloat(cliente.pago).toFixed(2)}</div>
                            <div class="mt-1">${statusBadge}</div>
                        </div>
                    </div>
                    <div class="flex space-x-2 pt-1 border-t border-gray-700/50">
                        <button onclick="enviarRecordatorio('${cliente.nombre}', '${cliente.telefono}', ${diasRestantes}, '${fVencStr}')" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium text-xs py-2 px-3 rounded-lg flex items-center justify-center space-x-1.5 transition">
                            <i data-lucide="message-square" class="w-3.5 h-3.5"></i>
                            <span>Notificar Cobro</span>
                        </button>
                        <button onclick="eliminarCliente(${index})" class="bg-gray-700 hover:bg-red-600/30 hover:text-red-400 text-gray-400 p-2 rounded-lg transition" title="Eliminar cliente">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
                listaContenedor.appendChild(div);
            });

            // Actualizar el Panel de Métricas
            document.getElementById('stat-clientes').innerText = activosContador;
            document.getElementById('stat-ingresos').innerText = `$${totalIngresos.toFixed(2)}`;
            
            // Renderizar nuevos iconos cargados dinámicamente
            lucide.createIcons();
        }

        // Función para procesar el envío del formulario
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nuevoCliente = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value.replace(/\s+/g, ''), // Remueve espacios
                pago: document.getElementById('pago').value,
                fechaInicio: document.getElementById('fechaInicio').value
            };

            clientes.push(nuevoCliente);
            localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
            
            form.reset();
            document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];
            actualizarInterfaz();
        });

        // Función para eliminar registros
        function eliminarCliente(index) {
            if (confirm("¿Estás seguro de que deseas eliminar este cliente?")) {
                clientes.splice(index, 1);
                localStorage.setItem('ciodaro_clientes', JSON.stringify(clientes));
                actualizarInterfaz();
            }
        }

        // Función para abrir la API de WhatsApp con mensajes pre-redactados
        function enviarRecordatorio(nombre, telefono, diasRestantes, fechaVenc) {
            let mensaje = "";
            
            if (diasRestantes < 0) {
                mensaje = `Hola ${nombre}, ¡te saluda tu coach! Te escribo para recordarte que tu paquete mensual de entrenamiento venció el pasado ${fechaVenc}. Quedo atento para coordinar la renovación de tu ciclo y seguir dándole con todo al entrenamiento. 💪🔥`;
            } else if (diasRestantes <= 3) {
                mensaje = `Hola ${nombre}, ¡te saluda tu coach! Espero que vayas excelente. Te escribo para comentarte que tu mensualidad de entrenamiento está próxima a vencer este ${fechaVenc}. Avísame si necesitas los datos para asegurar tu cupo del próximo mes. ¡Seguimos enfocados! ⚡🏋️‍♂️`;
            } else {
                mensaje = `Hola ${nombre}, ¡te saluda tu coach! Pasaba a reportarme y recordarte que tu ciclo actual está activo hasta el ${fechaVenc}. ¡A seguir entrenando inteligente! 🎯🚀`;
            }

            // Codifica el texto para que sea válido en una URL
            const urlMensaje = encodeURIComponent(mensaje);
            // Redirecciona directamente a WhatsApp
            window.open(`https://wa.me/${telefono}?text=${urlMensaje}`, '_blank');
        }

        // Carga inicial al abrir la página
        actualizarInterfaz();
    </script>
</body>
</html>
