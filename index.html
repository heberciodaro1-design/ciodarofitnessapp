<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness - Panel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans pb-12">

    <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700/50 p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <h1 class="text-xl font-black tracking-wider text-orange-500">CIODAROFITNESS<span class="text-slate-400 text-xs font-normal lowercase pl-1">pro</span></h1>
            <button onclick="toggleVisibilidad()" class="p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition shadow-md">
                <i id="icono-ojo" data-lucide="eye" class="w-5 h-5 text-orange-400"></i>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <!-- DASHBOARD -->
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center text-slate-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Clientes Activos</span>
                    <i data-lucide="users" class="w-4 h-4 text-orange-500"></i>
                </div>
                <div class="text-2xl font-bold text-white" id="stat-clientes">0</div>
            </div>
            
            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center text-slate-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Meta Mensual ($)</span>
                    <i data-lucide="target" class="w-4 h-4 text-blue-400"></i>
                </div>
                <input type="number" id="metaMensual" value="600" oninput="calcularFinanzas()" class="w-full bg-slate-700 text-white font-bold text-xl rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400">
            </div>

            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center text-slate-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Recaudado</span>
                    <i data-lucide="dollar-sign" class="w-4 h-4 text-emerald-500"></i>
                </div>
                <div class="text-2xl font-bold text-emerald-400" id="stat-ingresos">$0.00</div>
            </div>

            <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-md">
                <div class="flex justify-between items-center text-slate-400 mb-1">
                    <span class="text-xs font-semibold uppercase tracking-wider">Falta cobrar</span>
                    <i data-lucide="trending-down" class="w-4 h-4 text-orange-400"></i>
                </div>
                <div class="text-2xl font-bold text-orange-400" id="stat-restante">$0.00</div>
            </div>
        </section>

        <!-- BUSCADOR -->
        <section class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i data-lucide="search" class="w-5 h-5"></i>
            </div>
            <input type="text" id="buscadorCliente" onkeyup="filtrarClientes()" placeholder="Buscar cliente..." class="w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:border-orange-500 transition shadow-md">
        </section>

        <!-- LISTA CLIENTES -->
        <section class="bg-slate-800 border border-slate-700/60 rounded-xl shadow-md overflow-hidden">
            <div id="contenedor-clientes" class="divide-y divide-slate-700/50">
                <!-- Los clientes van aquí. Ejemplo: -->
                <div class="p-4 flex justify-between items-center cliente-fila">
                    <div>
                        <p class="font-semibold text-white nombre-cliente">Angie Chavarría</p>
                        <input type="number" class="cuota-cliente bg-slate-700 text-white rounded px-2 w-16 text-sm mt-1" value="40" oninput="calcularFinanzas()">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer bg-slate-700/50 px-3 py-2 rounded-lg border border-slate-600/50">
                        <input type="checkbox" class="pago-status accent-emerald-500 w-5 h-5" onchange="calcularFinanzas()">
                    </label>
                </div>
                
                <div class="p-4 flex justify-between items-center cliente-fila">
                    <div>
                        <p class="font-semibold text-white nombre-cliente">César Lares</p>
                        <input type="number" class="cuota-cliente bg-slate-700 text-white rounded px-2 w-16 text-sm mt-1" value="35" oninput="calcularFinanzas()">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer bg-slate-700/50 px-3 py-2 rounded-lg border border-slate-600/50">
                        <input type="checkbox" class="pago-status accent-emerald-500 w-5 h-5" onchange="calcularFinanzas()">
                    </label>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        let visible = true;

        function toggleVisibilidad() {
            visible = !visible;
            const icono = document.getElementById('icono-ojo');
            icono.setAttribute('data-lucide', visible ? 'eye' : 'eye-off');
            lucide.createIcons();
            calcularFinanzas(); // Recalcular inmediatamente
        }

        function filtrarClientes() {
            const filter = document.getElementById('buscadorCliente').value.toLowerCase();
            const filas = document.querySelectorAll('.cliente-fila');
            
            filas.forEach(fila => {
                const nombre = fila.querySelector('.nombre-cliente').innerText.toLowerCase();
                fila.classList.toggle('hidden', !nombre.includes(filter));
            });
        }

        function calcularFinanzas() {
            const metaTotal = parseFloat(document.getElementById('metaMensual').value) || 0;
            const filas = document.querySelectorAll('.cliente-fila');
            let totalRecaudado = 0;
            let activos = 0;

            filas.forEach(fila => {
                const cuota = parseFloat(fila.querySelector('.cuota-cliente').value) || 0;
                const pagado = fila.querySelector('.pago-status').checked;
                
                if (pagado) {
                    totalRecaudado += cuota;
                    fila.classList.add('opacity-40');
                } else {
                    fila.classList.remove('opacity-40');
                }
                activos++;
            });

            const resta = Math.max(0, metaTotal - totalRecaudado);

            // Actualizar UI
            document.getElementById('stat-clientes').innerText = activos;
            if (visible) {
                document.getElementById('stat-ingresos').innerText = `$${totalRecaudado.toFixed(2)}`;
                document.getElementById('stat-restante').innerText = `$${resta.toFixed(2)}`;
            } else {
                document.getElementById('stat-ingresos').innerText = '***';
                document.getElementById('stat-restante').innerText = '***';
            }
        }

        window.onload = calcularFinanzas;
    </script>
</body>
</html>
