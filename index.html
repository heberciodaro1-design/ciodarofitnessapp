<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciodarofitness Pro - Panel Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ciodaro-black': '#09090b',
                        'ciodaro-grey': '#1c1c1e',
                        'ciodaro-input': '#2c2c2e',
                        'ciodaro-yellow': '#facc15'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-ciodaro-black text-zinc-100 font-sans min-h-screen pb-12">

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="max-w-4xl mx-auto p-4 space-y-4">
        
        <!-- ENCABEZADO -->
        <header class="flex justify-between items-center bg-ciodaro-grey p-4 rounded-xl border border-zinc-800">
            <div>
                <h1 class="text-2xl font-black text-ciodaro-yellow tracking-tight">CIODAROFITNESS</h1>
                <p class="text-[10px] text-zinc-400 uppercase tracking-wider">Control de Alumnos y Pagos</p>
            </div>
            <div class="bg-ciodaro-black px-4 py-2 rounded-lg border border-zinc-800 text-right">
                <p class="text-[9px] text-zinc-500 uppercase font-bold">Caja Total Proyectada</p>
                <h2 id="txt-caja" class="text-lg font-black text-ciodaro-yellow">$0</h2>
            </div>
        </header>

        <!-- ACCIONES -->
        <div class="flex gap-2">
            <input type="text" id="buscador" onkeyup="renderizar()" placeholder="🔍 Buscar alumno..." class="flex-1 px-4 py-2.5 bg-ciodaro-grey border border-zinc-800 rounded-lg outline-none focus:border-ciodaro-yellow text-sm text-white">
            <button onclick="abrirModal()" class="bg-ciodaro-yellow text-black font-bold px-4 rounded-lg hover:bg-yellow-500 transition text-sm shrink-0">
                ➕ Nuevo Alumno
            </button>
        </div>

        <!-- LISTADO DE CLIENTES -->
        <div id="contenedor-clientes" class="space-y-2">
            <!-- Render dinámico -->
        </div>
    </div>

    <!-- MODAL REGISTRO / EDICIÓN (DATOS BÁSICOS Y EVALUACIÓN) -->
    <div id="modal-cliente" class="fixed inset-0 bg-black/85 hidden flex items-center justify-center p-4 z-50 overflow-y-auto backdrop-blur-sm">
        <div class="bg-ciodaro-grey w-full max-w-xl rounded-xl border border-zinc-800 p-5 space-y-4 my-4">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
                <h2 id="modal-titulo" class="text-base font-black text-ciodaro-yellow uppercase">Perfil del Alumno</h2>
                <button onclick="cerrarModal()" class="text-zinc-400 hover:text-white">✕</button>
            </div>
            
            <form id="form-cliente" onsubmit="guardarCliente(event)" class="space-y-4 text-sm">
                <input type="hidden" id="edit-index">
                
                <!-- Datos Principales -->
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-2">
                    <div class="sm:col-span-2">
                        <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Nombre Completo</label>
                        <input type="text" id="m-nombre" required class="w-full bg-ciodaro-input border border-zinc-700 rounded p-2 text-white outline-none focus:border-ciodaro-yellow">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Valor Plan ($)</label>
                        <input type="number" id="m-cuota" required min="0" oninput="calcularSaldoModal()" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-2 text-white outline-none focus:border-ciodaro-yellow">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Total Abonado ($)</label>
                        <input type="number" id="m-abonado" min="0" oninput="calcularSaldoModal()" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-2 text-white outline-none focus:border-ciodaro-yellow" placeholder="Ej: 20">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 bg-ciodaro-black/40 p-2 rounded border border-zinc-800">
                    <div>
                        <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Fecha de Inicio</label>
                        <input type="date" id="m-fecha-inicio" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Género</label>
                        <select id="m-genero" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1.5 text-white outline-none">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    <div class="flex flex-col justify-center items-center">
                        <span class="text-[10px] uppercase text-zinc-500 font-bold">Estado de Cuenta</span>
                        <span id="modal-saldo-status" class="text-sm font-black mt-0.5 text-white">Restan: $0</span>
                    </div>
                </div>

                <!-- SECCIÓN DOBLE: COMPARATIVA DE MÉTRICAS (MES PASADO VS MES ACTUAL) -->
                <div class="border-t border-zinc-800 pt-3">
                    <h3 class="text-xs font-black text-ciodaro-yellow uppercase mb-2 tracking-wider">Comparativa Métrica Mensual</h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Columna Mes Pasado / Inicial -->
                        <div class="bg-ciodaro-black p-3 rounded-lg border border-zinc-800 space-y-2">
                            <p class="text-[10px] font-bold text-zinc-400 uppercase border-b border-zinc-800 pb-1">📉 Mes Pasado / Inicial</p>
                            <div class="space-y-1 text-xs">
                                <label class="block text-zinc-500">Peso (kg):</label>
                                <input type="number" step="0.1" id="m-peso" required class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white">
                                <label class="block text-zinc-500">Estatura (m o cm):</label>
                                <input type="number" step="0.01" id="m-estatura" required class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white">
                                <label class="block text-zinc-500">Cintura (cm):</label>
                                <input type="number" step="0.1" id="m-cintura" required class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white">
                                <label class="block text-zinc-500">Glúteo (cm):</label>
                                <input type="number" step="0.1" id="m-gluteos" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white">
                            </div>
                        </div>

                        <!-- Columna Mes Actual / Nuevo -->
                        <div class="bg-zinc-900/60 p-3 rounded-lg border border-zinc-700/40 space-y-2">
                            <p class="text-[10px] font-bold text-ciodaro-yellow uppercase border-b border-zinc-800 pb-1">🔥 Mes Actual / Progreso</p>
                            <div class="space-y-1 text-xs">
                                <label class="block text-zinc-400">Peso Actual (kg):</label>
                                <input type="number" step="0.1" id="m-peso-act" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white focus:border-ciodaro-yellow">
                                <label class="block text-zinc-400">Estatura (m):</label>
                                <input type="number" step="0.01" id="m-estatura-act" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white focus:border-ciodaro-yellow">
                                <label class="block text-zinc-400">Cintura Actual (cm):</label>
                                <input type="number" step="0.1" id="m-cintura-act" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white focus:border-ciodaro-yellow">
                                <label class="block text-zinc-400">Glúteo Actual (cm):</label>
                                <input type="number" step="0.1" id="m-gluteos-act" class="w-full bg-ciodaro-input border border-zinc-700 rounded p-1 text-white focus:border-ciodaro-yellow">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notas Básicas -->
                <div>
                    <label class="block text-[11px] font-bold text-zinc-400 uppercase mb-0.5">Anotaciones del Plan / Evolución</label>
                    <textarea id="m-comparaciones" rows="2" placeholder="Detalles de entrenamiento o recordatorios..." class="w-full bg-ciodaro-input border border-zinc-700 rounded p-2 text-xs text-white resize-none outline-none"></textarea>
                </div>

                <!-- Botones de Acción -->
                <div class="flex justify-end gap-2 border-t border-zinc-800 pt-2">
                    <button type="button" onclick="cerrarModal()" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 rounded text-xs font-medium">Cancelar</button>
                    <button type="submit" class="px-4 py-1.5 bg-ciodaro-yellow text-black font-black rounded text-xs uppercase tracking-wider">Guardar Ficha</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script>
        let baseClientes = [];
        try {
            baseClientes = JSON.parse(localStorage.getItem('ciodaro_fitness_db')) || [];
            if (!Array.isArray(baseClientes)) baseClientes = [];
        } catch(e) { baseClientes = []; }

        function calcularMetricas(peso, estatura) {
            if (estatura > 3) estatura = estatura / 100;
            let imc = (peso / (estatura * estatura)).toFixed(1);
            return (isNaN(imc) || !isFinite(imc)) ? "0.0" : imc;
        }

        function calcularSaldoModal() {
            let cuota = parseFloat(document.getElementById('m-cuota').value) || 0;
            let abonado = parseFloat(document.getElementById('m-abonado').value) || 0;
            let saldo = cuota - abonado;
            let statusLabel = document.getElementById('modal-saldo-status');

            if (saldo <= 0 && cuota > 0) {
                statusLabel.innerText = "🟢 PAGADO";
                statusLabel.className = "text-sm font-black mt-0.5 text-emerald-400";
            } else {
                statusLabel.innerText = `Restan: $${saldo}`;
                statusLabel.className = "text-sm font-black mt-0.5 text-yellow-500";
            }
        }

        function guardarCliente(e) {
            e.preventDefault();
            let index = document.getElementById('edit-index').value;
            
            let cuota = parseFloat(document.getElementById('m-cuota').value) || 0;
            let abonado = parseFloat(document.getElementById('m-abonado').value) || 0;
            let saldoRestante = cuota - abonado;

            let pesoPasado = parseFloat(document.getElementById('m-peso').value) || 0;
            let estPasada = parseFloat(document.getElementById('m-estatura').value) || 1;
            if (estPasada > 3) estPasada = estPasada / 100;

            let pesoAct = parseFloat(document.getElementById('m-peso-act').value) || 0;
            let estAct = parseFloat(document.getElementById('m-estatura-act').value) || estPasada;
            if (estAct > 3) estAct = estAct / 100;

            let datosCliente = {
                nombre: (document.getElementById('m-nombre').value || '').trim(),
                cuota: cuota,
                abonado: abonado,
                saldo: saldoRestante <= 0 ? 0 : saldoRestante,
                estadoPago: (saldoRestante <= 0 && cuota > 0) ? 'PAGADO' : 'DEBE',
                genero: document.getElementById('m-genero').value,
                fechaInicio: document.getElementById('m-fecha-inicio').value || '',
                comparaciones: (document.getElementById('m-comparaciones').value || '').trim(),
                
                // Métricas antiguas (Mes Pasado)
                peso: pesoPasado,
                estatura: estPasada,
                imc: calcularMetricas(pesoPasado, estPasada),
                cintura: parseFloat(document.getElementById('m-cintura').value) || 0,
                gluteos: parseFloat(document.getElementById('m-gluteos').value) || 0,
                
                // Métricas Nuevas (Mes Actual)
                pesoAct: pesoAct,
                estaturaAct: estAct,
                imcAct: pesoAct > 0 ? calcularMetricas(pesoAct, estAct) : '-',
                cinturaAct: parseFloat(document.getElementById('m-cintura-act').value) || 0,
                gluteosAct: parseFloat(document.getElementById('m-gluteos-act').value) || 0
            };

            if (index === "") baseClientes.push(datosCliente);
            else baseClientes[index] = datosCliente;

            sincronizarStorage();
            cerrarModal();
            renderizar();
        }

        function renderizar() {
            let contenedor = document.getElementById('contenedor-clientes');
            if(!contenedor) return;

            let busqueda = (document.getElementById('buscador')?.value || '').toLowerCase();
            let totalCaja = 0;
            contenedor.innerHTML = "";

            baseClientes.forEach((cliente, index) => {
                if (!cliente || !cliente.nombre) return;
                
                totalCaja += (parseFloat(cliente.cuota) || 0);
                if (!cliente.nombre.toLowerCase().includes(busqueda)) return;

                let displayFecha = "Sin fecha";
                if (cliente.fechaInicio) {
                    let partes = cliente.fechaInicio.split('-');
                    if(partes.length === 3) displayFecha = `${partes[2]}/${partes[1]}`;
                }

                // Generar etiqueta de balance simplificada
                let etiquetaPago = "";
                if (cliente.estadoPago === 'PAGADO') {
                    etiquetaPago = `<span class="bg-emerald-950 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase">✅ Pagado</span>`;
                } else {
                    etiquetaPago = `<span class="bg-red-950 text-red-400 border border-red-500/20 px-2 py-0.5 rounded text-[10px] font-black">⏳ Restan: $${cliente.saldo}</span>`;
                }

                let fila = document.createElement('div');
                fila.className = "bg-ciodaro-grey p-3 rounded-lg border border-zinc-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 text-sm";
                
                fila.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-white uppercase truncate text-sm">${cliente.nombre}</h3>
                            ${etiquetaPago}
                        </div>
                        <p class="text-[11px] text-zinc-400 mt-1">
                            Plan: <span class="text-ciodaro-yellow font-bold">$${cliente.cuota}</span> (Abonó: $${cliente.abonado || 0}) 
                            | Cintura: <span class="text-zinc-300 font-mono">${cliente.cintura}cm</span> ➡️ <span class="text-ciodaro-yellow font-bold font-mono">${cliente.cinturaAct || '-'}cm</span> 
                            | Inicio: ${displayFecha}
                        </p>
                    </div>
                    
                    <div class="flex items-center gap-1 self-end sm:self-center shrink-0">
                        <button onclick="editarCliente(${index})" class="bg-zinc-800 hover:bg-zinc-700 text-ciodaro-yellow px-3 py-1.5 rounded font-bold text-xs flex items-center gap-1">✏️ Ver / Comparar</button>
                        <button onclick="eliminarCliente(${index})" class="bg-red-950/20 hover:bg-red-900/30 text-red-400 p-1.5 rounded text-xs">🗑️</button>
                    </div>
                `;
                contenedor.appendChild(fila);
            });

            document.getElementById('txt-caja').innerText = `$${totalCaja.toLocaleString()}`;
        }

        function editarCliente(index) {
            let cliente = baseClientes[index];
            if(!cliente) return;

            document.getElementById('modal-titulo').innerText = "Editar Alumno y Medidas";
            document.getElementById('edit-index').value = index;
            
            document.getElementById('m-nombre').value = cliente.nombre || '';
            document.getElementById('m-cuota').value = cliente.cuota || 0;
            document.getElementById('m-abonado').value = cliente.abonado || 0;
            document.getElementById('m-genero').value = cliente.genero || 'M';
            document.getElementById('m-fecha-inicio').value = cliente.fechaInicio || '';
            document.getElementById('m-comparaciones').value = cliente.comparaciones || '';
            
            // Datos Mes anterior
            document.getElementById('m-peso').value = cliente.peso || '';
            document.getElementById('m-estatura').value = cliente.estatura || '';
            document.getElementById('m-cintura').value = cliente.cintura || '';
            document.getElementById('m-gluteos').value = cliente.gluteos || '';

            // Datos Mes actual
            document.getElementById('m-peso-act').value = cliente.pesoAct || '';
            document.getElementById('m-estatura-act').value = cliente.estaturaAct || '';
            document.getElementById('m-cintura-act').value = cliente.cinturaAct || '';
            document.getElementById('m-gluteos-act').value = cliente.gluteosAct || '';

            calcularSaldoModal();
            abrirModal();
        }

        function abrirModal() { document.getElementById('modal-cliente').classList.remove('hidden'); }
        function cerrarModal() {
            document.getElementById('modal-cliente').classList.add('hidden');
            document.getElementById('form-cliente').reset();
            document.getElementById('edit-index').value = "";
        }

        function eliminarCliente(index) {
            if (baseClientes[index] && confirm(`¿Eliminar a ${baseClientes[index].nombre}?`)) {
                baseClientes.splice(index, 1);
                sincronizarStorage();
                renderizar();
            }
        }

        function sincronizarStorage() { localStorage.setItem('ciodaro_fitness_db', JSON.stringify(baseClientes)); }

        window.onload = function() { renderizar(); };
    </script>
</body>
</html>
